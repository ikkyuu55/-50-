<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>作者名 50音制覇チャレンジ</title>

<style>
body{
  font-family: "メイリオ", Meiryo, system-ui, sans-serif;
  background:#f4f1ec;
  padding:20px;
}
h1{
  text-align:center;
}
.rules{
  max-width:900px;
  margin:0 auto 12px;
  background:#fff;
  padding:12px;
  border-radius:8px;
  font-size:14px;
}
.progress{
  text-align:center;
  font-weight:bold;
  margin-bottom:12px;
}
table{
  border-collapse:collapse;
  margin:auto;
}
td{
  border:1px solid #bbb;
  width:140px;
  height:235px;
  vertical-align:top;
  padding:6px;
  transition:background-color 0.3s;
}
.kana{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:4px;
}
input[type="text"],
input[type="date"]{
  width:100%;
  box-sizing:border-box;
  font-size:13px;
  margin-bottom:4px;
  padding:3px;
}
input[type="date"]{
  appearance:none;
  -webkit-appearance:none;
}
img{
  max-width:100%;
  max-height:80px;
  display:block;
  margin:4px auto;
}
input[type="file"]{
  width:100%;
  font-size:12px;
}

/* 本棚カラー */
.row0{background:#f8efe4;}
.row1{background:#f1e3d3;}
.row2{background:#e6f0e6;}
.row3{background:#e8edf3;}
.row4{background:#efe6f3;}
.filled{
  filter:brightness(0.9);
}
</style>
</head>

<body>

<h1>作者名 50音制覇チャレンジ</h1>

<div class="rules">
<strong>ルール</strong><br>
・どこからでもOK！<br>
・日本文学・海外文学なんでもOK！<br>
・読み終わったら表紙を撮ってLINEに！<br>
・外国人作家はファミリーネームで分類！
</div>

<div class="progress" id="progress"></div>

<table id="gojuon"></table>

<script>
const colors=["row0","row1","row2","row3","row4"];

const gojuon=[
["あ","い","う","え","お"],
["か","き","く","け","こ"],
["さ","し","す","せ","そ"],
["た","ち","つ","て","と"],
["な","に","ぬ","ね","の"],
["は","ひ","ふ","へ","ほ"],
["ま","み","む","め","も"],
["や","","ゆ","","よ"],
["ら","り","る","れ","ろ"],
["わ","を","","","ん"]
];

const table=document.getElementById("gojuon");
const progress=document.getElementById("progress");

function updateProgress(){
  let filled=0,total=0;
  gojuon.flat().forEach(c=>{
    if(c!==""){
      total++;
      if(localStorage.getItem("gojuon_"+c+"_author")
        || localStorage.getItem("gojuon_"+c+"_date")
        || localStorage.getItem("gojuon_"+c+"_img")){
          filled++;
      }
    }
  });
  progress.textContent=`制覇率：${filled} / ${total}`;
}

gojuon.forEach((row,r)=>{
  const tr=document.createElement("tr");
  row.forEach(char=>{
    const td=document.createElement("td");
    td.classList.add(colors[r%colors.length]);

    if(char!==""){
      const key="gojuon_"+char;

      const kana=document.createElement("div");
      kana.className="kana";
      kana.textContent=char;

      const author=document.createElement("input");
      author.type="text";
      author.placeholder="作者名";
      author.value=localStorage.getItem(key+"_author")||"";

      const date=document.createElement("input");
      date.type="date";
      date.value=localStorage.getItem(key+"_date")||"";

      const img=document.createElement("img");
      const savedImg=localStorage.getItem(key+"_img");
      if(savedImg) img.src=savedImg;

      const file=document.createElement("input");
      file.type="file";
      file.accept="image/*";

      function updateCell(){
        if(author.value||date.value||img.src){
          td.classList.add("filled");
        }else{
          td.classList.remove("filled");
        }
        updateProgress();
      }

      author.oninput=()=>{
        localStorage.setItem(key+"_author",author.value);
        updateCell();
      };
      date.oninput=()=>{
        localStorage.setItem(key+"_date",date.value);
        updateCell();
      };
      file.onchange=()=>{
        const f=file.files[0];
        if(!f)return;
        const r=new FileReader();
        r.onload=()=>{
          img.src=r.result;
          localStorage.setItem(key+"_img",r.result);
          updateCell();
        };
        r.readAsDataURL(f);
      };

      if(author.value||date.value||savedImg){
        td.classList.add("filled");
      }

      td.appendChild(kana);
      td.appendChild(author);
      td.appendChild(date);
      td.appendChild(img);
      td.appendChild(file);
    }
    tr.appendChild(td);
  });
  table.appendChild(tr);
});

updateProgress();
</script>

</body>
</html>
