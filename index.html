<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>作者名 五十音制覇チャレンジ</title>

<style>
body{
  font-family:"メイリオ", Meiryo, system-ui, sans-serif;
  background:#f4f1ec;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.rules{
  max-width:980px;
  margin:0 auto 14px;
  background:#fff;
  padding:12px;
  border-radius:8px;
  font-size:14px;
}

.progress{
  text-align:center;
  font-weight:bold;
  font-size:28px;
  margin-bottom:14px;
}

table{
  border-collapse:collapse;
  margin:0 auto;
  max-width:980px;
  width:100%;
}

td{
  border:1px solid #bbb;
  height:270px;
  vertical-align:top;
  padding:6px;
}

.kana{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:4px;
}

/* 作者名 */
.author-input{
  width:100%;
  box-sizing:border-box;
  margin-bottom:2px;
  font-size:18px;
  text-align:center;
}

/* 日付 */
.date-input{
  width:95%;
  box-sizing:border-box;
  margin-bottom:4px;
  font-size:13px;
  text-align:center;
}

img{
  max-width:100%;
  max-height:70px;
  display:block;
  margin:4px auto;
}

.memo-btn{
  width:100%;
  margin-top:4px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#e8c7d8;
  font-size:13px;
}

/* 本棚カラー */
.row0{background:#f8efe4;}
.row1{background:#f1e3d3;}
.row2{background:#e6f0e6;}
.row3{background:#e8edf3;}
.row4{background:#efe6f3;}

.filled{
  filter:brightness(0.92);
}

/* ===== モーダル ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  z-index:10;
}


.modal-content{
  background:#fff;
  width:96%;          /* ← スマホでほぼ横いっぱい */
  max-width:600px;    /* ← PCでは広めに */
  padding:18px;
  border-radius:10px;
}


.modal h2{
  text-align:center;
  font-size:28px;
  margin:0 0 10px;
}

.modal input,
.modal textarea{
  width:100%;
  box-sizing:border-box;
  margin-bottom:6px;
  font-size:14px;
}

textarea{
  min-height:120px;
}

.close{
  text-align:right;
  cursor:pointer;
}
  /* ===== スマホ表示時：表の文字サイズ底上げ ===== */
@media (max-width: 600px){

  /* かな（あ・か・さ…） */
  .kana{
    font-size:20px;   /* ← ルール文字より大 */
  }

  /* 作者名 */
  .author-input{
    font-size:18px;   /* ← 最低でも18px */
  }

  /* 日付 */
  .date-input{
    font-size:14px;   /* ← ルール文字と同等 */
  }

  /* メモボタン */
  .memo-btn{
    font-size:14px;
  }
}

</style>
</head>

<body>

<h1>作者名 五十音制覇チャレンジ</h1>
<div class="progress" id="progress"></div>

<div class="rules">
<strong>ルール</strong><br>
・どこからでもOK！<br>
・日本文学・海外文学なんでもOK！<br>
・読み終わったら表紙を撮ってLINEに！<br>
・外国人作家はファミリーネームで分類！
</div>

<table id="gojuon"></table>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" id="modalClose">✖ 閉じる</div>
    <h2 id="modalKana"></h2>
    <input id="modalAuthor" type="text" placeholder="作者名">
    <input id="modalDate" type="date">
    <img id="modalImg">
    <input id="modalFile" type="file" accept="image/*">
    <textarea id="modalMemo" placeholder="本の感想・メモ"></textarea>
  </div>
</div>

<script>
/* ===== 定義 ===== */
const colors=["row0","row1","row2","row3","row4"];
const gojuon=[
["あ","い","う","え","お"],
["か","き","く","け","こ"],
["さ","し","す","せ","そ"],
["た","ち","つ","て","と"],
["な","に","ぬ","ね","の"],
["は","ひ","ふ","へ","ほ"],
["ま","み","む","め","も"],
["や","","ゆ","","よ"],
["ら","り","る","れ","ろ"],
["わ","","を","","ん"]   // ← を を右に移動
];

const table=document.getElementById("gojuon");
const progress=document.getElementById("progress");

const modal=document.getElementById("modal");
const modalKana=document.getElementById("modalKana");
const modalAuthor=document.getElementById("modalAuthor");
const modalDate=document.getElementById("modalDate");
const modalImg=document.getElementById("modalImg");
const modalFile=document.getElementById("modalFile");
const modalMemo=document.getElementById("modalMemo");
const modalClose=document.getElementById("modalClose");

let currentKey="";

/* ===== 機能 ===== */
function updateProgress(){
  let filled=0,total=0;
  gojuon.flat().forEach(c=>{
    if(c){
      total++;
      if(localStorage.getItem("gojuon_"+c+"_author")){
        filled++;
      }
    }
  });
  progress.textContent=`制覇率：${filled} / ${total}`;
}

function openModal(char){
  currentKey="gojuon_"+char;
  modal.style.display="flex";
  modalKana.textContent=char;
  modalAuthor.value=localStorage.getItem(currentKey+"_author")||"";
  modalDate.value=localStorage.getItem(currentKey+"_date")||"";
  modalMemo.value=localStorage.getItem(currentKey+"_memo")||"";
  modalImg.src=localStorage.getItem(currentKey+"_img")||"";
}

function closeModal(){
  modal.style.display="none";
}

/* モーダルイベント */
modalClose.addEventListener("click",closeModal);

modalAuthor.addEventListener("input",()=>{
  localStorage.setItem(currentKey+"_author",modalAuthor.value);
  renderTable();
  updateProgress();
});

modalDate.addEventListener("input",()=>{
  localStorage.setItem(currentKey+"_date",modalDate.value);
  renderTable();
});

modalMemo.addEventListener("input",()=>{
  localStorage.setItem(currentKey+"_memo",modalMemo.value);
});

modalFile.addEventListener("change",()=>{
  const file=modalFile.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    localStorage.setItem(currentKey+"_img",reader.result);
    modalImg.src=reader.result;
    renderTable();
  };
  reader.readAsDataURL(file);
});

/* ===== 表生成 ===== */
function renderTable(){
  table.innerHTML="";
  gojuon.forEach((row,r)=>{
    const tr=document.createElement("tr");
    row.forEach(char=>{
      const td=document.createElement("td");
      td.classList.add(colors[r%colors.length]);
      if(char){
        const key="gojuon_"+char;

        const kana=document.createElement("div");
        kana.className="kana";
        kana.textContent=char;

        const author=document.createElement("input");
        author.type="text";
        author.placeholder="作者名";
        author.className="author-input";
        author.value=localStorage.getItem(key+"_author")||"";
        author.addEventListener("input",()=>{
          localStorage.setItem(key+"_author",author.value);
          updateProgress();
        });

        const date=document.createElement("input");
        date.type="date";
        date.className="date-input";
        date.value=localStorage.getItem(key+"_date")||"";
        date.addEventListener("input",()=>{
          localStorage.setItem(key+"_date",date.value);
        });

        const imgData=localStorage.getItem(key+"_img");
        const img=document.createElement("img");
        if(imgData) img.src=imgData;

        const memoBtn=document.createElement("button");
        memoBtn.className="memo-btn";
        memoBtn.textContent="📖 メモ";
        memoBtn.addEventListener("click",()=>openModal(char));

        if(author.value||imgData) td.classList.add("filled");

        td.appendChild(kana);
        td.appendChild(author);
        td.appendChild(date);
        if(imgData) td.appendChild(img);
        td.appendChild(memoBtn);
      }
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}

/* 初期化 */
renderTable();
updateProgress();
</script>

</body>
</html>
